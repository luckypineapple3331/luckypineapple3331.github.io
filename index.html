<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房一诺 · 作品集</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:   #0d1117;
      --secondary: #161b22;
      --accent:    #e94560;
      --accent2:   #f5a623;
      --blue:      #1e90ff;
      --green:     #2ed573;
      --purple:    #a29bfe;
      --text:      #24292f;
      --muted:     #656d76;
      --bg:        #f3f4f6;
      --card:      #ffffff;
      --border:    #d0d7de;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.07);
      --shadow-md: 0 6px 24px rgba(0,0,0,.10);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.16);
      --radius:    18px;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ───── HERO ───── */
    .hero {
      background: linear-gradient(135deg, #fff 55%, #fdf3f5 100%);
      border-bottom: 1px solid var(--border);
      padding: 40px 32px 36px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--blue));
    }
    .hero-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 40px;
      align-items: center;
    }
    .hero-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 148px;
      background: linear-gradient(160deg, rgba(233,69,96,.06), rgba(245,166,35,.06));
      border: 1px solid rgba(233,69,96,.12);
      border-radius: 18px;
      padding: 20px 16px;
    }
    .hero-photo {
      width: 110px;
      height: 148px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(233,69,96,.2);
      box-shadow: 0 4px 16px rgba(0,0,0,.10);
    }
    .hero-name-block { text-align: center; }
    .hero-name-block h1 {
      font-size: 1.55em;
      font-weight: 800;
      color: var(--text);
      letter-spacing: .06em;
    }
    .hero-right {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .hero-contact {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .hero-contact-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .84em;
      color: var(--muted);
    }
    .hero-abilities { display: flex; flex-direction: column; gap: 10px; }
    .ability-row { display: flex; align-items: flex-start; gap: 10px; }
    .ability-label {
      font-size: .72em;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      white-space: nowrap;
      margin-top: 2px;
      flex-shrink: 0;
      border: 1px solid;
    }
    .ability-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .ability-tag {
      font-size: .78em;
      padding: 3px 11px;
      border-radius: 99px;
      border: 1px solid;
    }
    /* 工具 — 蓝色系 */
    .row-tool .ability-label { color: #1e90ff; background: rgba(30,144,255,.08); border-color: rgba(30,144,255,.28); }
    .row-tool .ability-tag   { color: #1565c0; background: rgba(30,144,255,.06); border-color: rgba(30,144,255,.2); }
    /* 能力 — 绿色系 */
    .row-skill .ability-label { color: #20a856; background: rgba(46,213,115,.08); border-color: rgba(46,213,115,.3); }
    .row-skill .ability-tag   { color: #1a6e3a; background: rgba(46,213,115,.07); border-color: rgba(46,213,115,.22); }
    /* 语言 — 紫色系 */
    .row-lang .ability-label { color: #7c6fe0; background: rgba(162,155,254,.12); border-color: rgba(162,155,254,.35); }
    .row-lang .ability-tag   { color: #4c3faa; background: rgba(162,155,254,.09); border-color: rgba(162,155,254,.28); }
    @media (max-width: 680px) {
      .hero-inner { grid-template-columns: 1fr; justify-items: center; gap: 24px; }
      .hero-contact { justify-content: center; }
      .ability-row { flex-direction: column; gap: 6px; }
      .ability-tags { justify-content: center; }
    }

    /* ───── FILTER NAV ───── */
    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .nav-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .f-btn {
      padding: 8px 22px;
      border: 2px solid transparent;
      border-radius: 99px;
      background: #f0f2f5;
      cursor: pointer;
      font-size: .88em;
      font-family: inherit;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      transition: all .22s ease;
    }
    .f-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,.06); }
    .f-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ───── STATS ───── */
    .stats-row {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px 32px 8px;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px 32px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      min-width: 110px;
    }
    .stat-n { font-size: 2em; font-weight: 800; color: var(--accent); }
    .stat-l { font-size: .78em; color: var(--muted); margin-top: 3px; }

    /* ───── GRID ───── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 32px 80px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 26px;
    }

    /* ───── CARD ───── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
      position: relative;
    }
    .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }
    .thumb-icon { font-size: 3.2em; position: relative; z-index: 1; }
    .thumb-label {
      color: rgba(255,255,255,.85);
      font-size: .85em;
      font-weight: 600;
      text-align: center;
      padding: 0 20px;
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 4px rgba(0,0,0,.4);
      line-height: 1.4;
    }
    /* play hover overlay */
    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.32);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .25s;
    }
    .card:hover .play-overlay { opacity: 1; }
    .play-circle {
      width: 64px; height: 64px;
      background: rgba(255,255,255,.95);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transform: scale(.85);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .card:hover .play-circle { transform: scale(1); }
    .play-tri {
      width: 0; height: 0;
      border-style: solid;
      border-width: 11px 0 11px 20px;
      border-color: transparent transparent transparent var(--accent);
      margin-left: 4px;
    }
    /* non-video open icon */
    .open-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.28);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .25s;
      font-size: 2.8em;
    }
    .card:hover .open-overlay { opacity: 1; }

    .card-body { padding: 20px 22px 22px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 12px;
      border-radius: 99px;
      font-size: .73em;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: .04em;
    }
    .badge-video  { background: rgba(233,69,96,.12);  color: #e94560; }
    .badge-plan   { background: rgba(30,144,255,.12);  color: #1e90ff; }
    .badge-design { background: rgba(46,213,115,.12);  color: #2ed573; }
    .badge-feed   { background: rgba(255,140,0,.12);   color: #FF8C00; }
    .badge-h5     { background: rgba(102,126,234,.12); color: #667eea; }
    .badge-tool    { background: rgba(162,155,254,.15); color: #a29bfe; }
    .badge-account { background: rgba(255,36,66,.10);  color: #FF2442; }

    /* ───── ACCOUNT MODAL ───── */
    .acc-modal-box { max-width: 620px; }
    .acc-modal-head {
      display: flex; align-items: center; gap: 22px;
      padding: 32px 32px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .acc-modal-icon-wrap {
      font-size: 2.8em;
      width: 72px; height: 72px;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .acc-modal-name { font-size: 1.35em; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .acc-modal-sub  { font-size: .82em; color: rgba(255,255,255,.45); }
    .acc-modal-body { padding: 22px 32px 30px; }
    .acc-modal-desc {
      font-size: .88em; color: rgba(255,255,255,.7);
      line-height: 1.75; margin-bottom: 20px;
    }
    .acc-highlights { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
    .acc-hl-pill {
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.88);
      padding: 4px 14px; border-radius: 99px;
      font-size: .78em; font-weight: 700;
      border: 1px solid rgba(255,255,255,.15);
    }
    .acc-platforms-title {
      font-size: .78em; font-weight: 700; color: rgba(255,255,255,.35);
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px;
    }
    .acc-platforms { display: flex; flex-wrap: wrap; gap: 10px; }
    .acc-platform-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 12px; border: none;
      font-size: .88em; font-weight: 700; cursor: pointer;
      text-decoration: none; color: #fff;
      transition: transform .18s, box-shadow .18s;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .acc-platform-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.4); }
    .acc-platform-btn.wechat-note {
      background: rgba(255,255,255,.08) !important;
      border: 1px solid rgba(255,255,255,.15);
      cursor: default; color: rgba(255,255,255,.55);
      font-size: .82em;
    }
    .acc-platform-btn.wechat-note:hover { transform: none; }

    .card-title { font-size: 1.02em; font-weight: 700; color: var(--text); margin-bottom: 7px; line-height: 1.45; }
    .card-desc  { font-size: .83em; color: var(--muted); line-height: 1.65; }
    .card-foot  { margin-top: 15px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tag-list   { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      background: #f0f2f5;
      color: var(--muted);
      padding: 2px 10px;
      border-radius: 8px;
      font-size: .72em;
    }
    .card-cta {
      font-size: .78em;
      font-weight: 700;
      color: var(--accent);
      opacity: 0;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .card:hover .card-cta { opacity: 1; }

    /* ───── MODAL ───── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity .28s, visibility .28s;
      backdrop-filter: blur(10px);
      padding: 24px;
    }
    .modal-bg.open { opacity: 1; visibility: visible; }
    .modal-box {
      width: 100%;
      max-width: 980px;
      background: #111318;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      transform: scale(.92) translateY(20px);
      transition: transform .32s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
    }
    .modal-bg.open .modal-box { transform: scale(1) translateY(0); }
    .modal-close-btn {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      width: 38px; height: 38px;
      background: rgba(255,255,255,.1);
      border: none; border-radius: 50%;
      color: #fff; font-size: 1em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .modal-close-btn:hover { background: rgba(255,255,255,.22); }
    .modal-video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
    .modal-footer { padding: 18px 22px 22px; color: #fff; }
    .modal-footer .modal-title { font-size: 1.12em; font-weight: 700; margin-bottom: 5px; }
    .modal-footer .modal-desc  { font-size: .84em; color: rgba(255,255,255,.45); }

    /* ───── EMPTY ───── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 1em;
    }

    /* ───── FOOTER ───── */
    footer {
      text-align: center;
      padding: 36px 20px;
      color: var(--muted);
      font-size: .86em;
      border-top: 1px solid var(--border);
    }

    /* ───── RESPONSIVE ───── */
    @media (max-width: 720px) {
      .hero { padding: 64px 20px 56px; }
      .nav-inner, main { padding-left: 16px; padding-right: 16px; }
      .stats-row { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; gap: 18px; }
      main { padding-bottom: 60px; }
    }
  </style>
</head>

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render(filter) {
  const list = filter === 'all' ? WORKS : WORKS.filter(w => w.type === filter);
  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = '<div class="empty">暂无该类型作品</div>';
    return;
  }

  grid.innerHTML = list.map(w => {
    const b = BADGE[w.type];
    const isVideo = w.type === 'video';
    const thumbStyle = w.img
      ? `background-image: linear-gradient(rgba(0,0,0,0.25),rgba(0,0,0,0.45)), url('${w.img}'); background-size:cover; background-position:center;`
      : `background:${w.bg}`;
    return `
    <div class="card" data-id="${w.id}">
      <div class="card-thumb" style="${thumbStyle}">
        <span class="thumb-icon">${w.icon}</span>
        <span class="thumb-label">${w.title}</span>
        ${isVideo
          ? `<div class="play-overlay"><div class="play-circle"><div class="play-tri"></div></div></div>`
          : `<div class="open-overlay">↗</div>`
        }
      </div>
      <div class="card-body">
        <span class="badge ${b.cls}">${b.label}</span>
        <div class="card-title">${w.title}</div>
        <div class="card-desc">${w.desc}</div>
        <div class="card-foot">
          <div class="tag-list">${w.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <span class="card-cta">${CTA[w.type]}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // bind click
  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      const w = WORKS.find(x => x.id === +el.dataset.id);
      if (!w) return;
      if (w.type === 'video') openVideo(w);
      else if (w.type === 'account') openAccount(w);
      else window.open(w.file, '_blank');
    });
  });
}

// ─── VIDEO MODAL ────────────────────────────────────────────────────────────
function openVideo(w) {
  const vid = document.getElementById('modalVid');
  vid.src = w.file;
  document.getElementById('modalTitle').textContent = w.title;
  document.getElementById('modalDesc').textContent  = w.desc;
  document.getElementById('modalBg').classList.add('open');
  vid.play().catch(() => {});
}
function closeVideo() {
  const bg  = document.getElementById('modalBg');
  const vid = document.getElementById('modalVid');
  bg.classList.remove('open');
  vid.pause();
  vid.src = '';
}
document.getElementById('modalClose').addEventListener('click', closeVideo);
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeVideo();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeVideo(); closeAccount(); } });

// ─── ACCOUNT MODAL ───────────────────────────────────────────────────────────
function openAccount(w) {
  document.getElementById('accModalIconWrap').textContent = w.icon;
  document.getElementById('accModalIconWrap').style.background = 'rgba(255,255,255,.1)';
  document.getElementById('accModalName').textContent = w.title;
  document.getElementById('accModalSub').textContent  = w.subtitle;
  document.getElementById('accModalDesc').textContent = w.desc;

  const hlEl = document.getElementById('accModalHighlights');
  hlEl.innerHTML = w.highlights.map(h => `<span class="acc-hl-pill">${h}</span>`).join('');

  const pfEl = document.getElementById('accModalPlatforms');
  pfEl.innerHTML = w.platforms.map(p => {
    if (p.note) {
      return `<span class="acc-platform-btn wechat-note">${p.icon} ${p.name}：${p.note}</span>`;
    }
    return `<a class="acc-platform-btn" href="${p.url}" target="_blank" rel="noopener"
              style="background:${p.bg}">${p.icon} ${p.name}</a>`;
  }).join('');

  document.getElementById('accModalBg').classList.add('open');
}
function closeAccount() {
  document.getElementById('accModalBg').classList.remove('open');
}
document.getElementById('accModalClose').addEventListener('click', closeAccount);
document.getElementById('accModalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('accModalBg')) closeAccount();
});

// ─── FILTER ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.f);
  });
});

// ─── INIT ────────────────────────────────────────────────────────────────────
render('all');
</script>
</body>
</html>
