<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历自动填充助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 密码锁屏 -->
  <div id="lockScreen" class="lock-screen hidden">
    <div class="lock-icon">🔒</div>
    <h3>请输入解锁密码</h3>
    <input type="password" id="unlockInput" placeholder="输入密码" autocomplete="off">
    <button id="unlockBtn" class="btn btn-primary">解锁</button>
    <p id="lockError" class="error-text hidden">密码错误，请重试</p>
  </div>

  <!-- 主界面 -->
  <div id="mainApp">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-left">
        <span class="logo">📄</span>
        <span class="title">简历自动填充助手</span>
      </div>
      <div class="header-right">
        <button id="btnSettings" class="icon-btn" title="设置">⚙️</button>
        <button id="btnHelp" class="icon-btn" title="帮助">❓</button>
      </div>
    </header>

    <!-- 招聘页面检测提示 -->
    <div id="pageDetectBanner" class="detect-banner hidden">
      <div id="detectSuccess" class="detect-success hidden">
        <span>✅ 检测到招聘页面</span>
        <div class="fill-actions">
          <button id="btnAutoFill" class="btn btn-success btn-lg">⚡ 一键填充</button>
          <button id="btnRefill" class="btn btn-outline btn-sm">🔄 重新填充</button>
        </div>
      </div>
      <div id="detectFail" class="detect-fail hidden">
        <span>⚠️ 未检测到招聘页面</span>
        <button id="btnForceDetect" class="btn btn-outline btn-sm">🔍 手动识别</button>
      </div>
    </div>

    <!-- 填充状态提示 -->
    <div id="fillStatus" class="fill-status hidden">
      <div id="fillLoading" class="status-loading hidden">
        <span class="spinner"></span> 填充中...
      </div>
      <div id="fillSuccess" class="status-success hidden">✅ 填充成功！共填充 <span id="fillCount">0</span> 个字段</div>
      <div id="fillWarning" class="status-warning hidden">
        ⚠️ <span id="fillWarningText"></span>
      </div>
      <div id="fillError" class="status-error hidden">❌ <span id="fillErrorText"></span></div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="resume">📋 简历信息</button>
      <button class="tab-btn" data-tab="settings">⚙️ 设置</button>
    </div>

    <!-- 简历信息标签页 -->
    <div id="tab-resume" class="tab-content active">
      <div class="form-container">

        <!-- 基础信息 -->
        <div class="section">
          <div class="section-header" data-section="basic">
            <span class="section-icon">👤</span>
            <span class="section-title">基础信息</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-basic">
            <div class="form-row">
              <label>姓名 <span class="required">*</span></label>
              <input type="text" id="basic-name" placeholder="请输入姓名">
            </div>
            <div class="form-row">
              <label>出生年月</label>
              <input type="text" id="basic-birth" placeholder="如：2001-06">
            </div>
            <div class="form-row">
              <label>联系电话 <span class="required">*</span></label>
              <input type="tel" id="basic-phone" placeholder="11位手机号">
            </div>
            <div class="form-row">
              <label>电子邮箱 <span class="required">*</span></label>
              <input type="email" id="basic-email" placeholder="example@email.com">
            </div>
            <div class="form-row">
              <label>联系地址</label>
              <input type="text" id="basic-address" placeholder="现居住城市或地址">
            </div>
          </div>
        </div>

        <!-- 教育经历 -->
        <div class="section">
          <div class="section-header" data-section="education">
            <span class="section-icon">🎓</span>
            <span class="section-title">教育经历</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-education">
            <div id="education-list" class="item-list"></div>
            <button class="btn btn-add" data-add="education">+ 新增教育经历</button>
          </div>
        </div>

        <!-- 实习经历 -->
        <div class="section">
          <div class="section-header" data-section="internship">
            <span class="section-icon">💼</span>
            <span class="section-title">实习经历</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-internship">
            <div id="internship-list" class="item-list"></div>
            <button class="btn btn-add" data-add="internship">+ 新增实习经历</button>
          </div>
        </div>

        <!-- 项目经历 -->
        <div class="section">
          <div class="section-header" data-section="project">
            <span class="section-icon">🚀</span>
            <span class="section-title">项目经历</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-project">
            <div id="project-list" class="item-list"></div>
            <button class="btn btn-add" data-add="project">+ 新增项目经历</button>
          </div>
        </div>

        <!-- 校园经历 -->
        <div class="section">
          <div class="section-header" data-section="campus">
            <span class="section-icon">🎖️</span>
            <span class="section-title">校园经历</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-campus">
            <div id="campus-list" class="item-list"></div>
            <button class="btn btn-add" data-add="campus">+ 新增校园经历</button>
          </div>
        </div>

        <!-- 获奖经历 -->
        <div class="section">
          <div class="section-header" data-section="awards">
            <span class="section-icon">🏅</span>
            <span class="section-title">获奖经历</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-awards">
            <div id="awards-list" class="item-list"></div>
            <button class="btn btn-add" data-add="awards">+ 新增获奖经历</button>
          </div>
        </div>

        <!-- 技能证书 -->
        <div class="section">
          <div class="section-header" data-section="skills">
            <span class="section-icon">🏆</span>
            <span class="section-title">技能证书</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-skills">
            <div class="form-row">
              <label>工具技能</label>
              <textarea id="skills-tools" placeholder="如：Office/WPS、SQL、PR/剪映、AI工具" rows="2"></textarea>
            </div>
            <div class="form-row">
              <label>语言能力</label>
              <textarea id="skills-languages" placeholder="如：英语CET6、普通话一级乙等" rows="2"></textarea>
            </div>
            <div class="form-row">
              <label>其他证书</label>
              <textarea id="skills-certificates" placeholder="资格证书等" rows="2"></textarea>
            </div>
          </div>
        </div>

        <!-- 个人简介 -->
        <div class="section">
          <div class="section-header" data-section="selfIntro">
            <span class="section-icon">✍️</span>
            <span class="section-title">个人简介</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-selfIntro">
            <div class="form-row">
              <textarea id="selfIntro-text" placeholder="个人能力、职业诉求等自我介绍内容" rows="4"></textarea>
            </div>
          </div>
        </div>

        <!-- 作品集 -->
        <div class="section">
          <div class="section-header" data-section="portfolio">
            <span class="section-icon">🔗</span>
            <span class="section-title">作品集</span>
            <span class="section-toggle">▼</span>
          </div>
          <div class="section-body" id="body-portfolio">
            <div class="form-row">
              <textarea id="portfolio-text" placeholder="个人主页、作品链接、GitHub 地址等" rows="3"></textarea>
            </div>
          </div>
        </div>

      </div><!-- /form-container -->
    </div><!-- /tab-resume -->

    <!-- 设置标签页 -->
    <div id="tab-settings" class="tab-content hidden">
      <div class="settings-container">
        <div class="setting-group">
          <h4>隐私保护</h4>
          <div class="setting-row">
            <label class="toggle-label">
              <input type="checkbox" id="enablePassword">
              <span class="toggle-switch"></span>
              启用密码保护
            </label>
          </div>
          <div id="passwordFields" class="hidden">
            <div class="form-row">
              <label>设置密码</label>
              <input type="password" id="newPassword" placeholder="请输入密码（4-16位）">
            </div>
            <div class="form-row">
              <label>确认密码</label>
              <input type="password" id="confirmPassword" placeholder="再次输入密码">
            </div>
            <button class="btn btn-outline btn-sm" id="savePasswordBtn">保存密码</button>
          </div>
        </div>

        <div class="setting-group">
          <h4>数据管理</h4>
          <button class="btn btn-outline btn-sm" id="exportBtn">📤 导出简历数据</button>
          <button class="btn btn-danger btn-sm" id="clearDataBtn">🗑️ 清除所有数据</button>
        </div>

        <div class="setting-group">
          <h4>关于</h4>
          <p class="about-text">简历自动填充助手 v1.0.0</p>
          <p class="about-text">所有数据仅存储在本地浏览器，不上传云端</p>
        </div>
      </div>
    </div><!-- /tab-settings -->

    <!-- 底部操作栏 -->
    <footer class="footer">
      <button id="btnSave" class="btn btn-primary">💾 保存信息</button>
      <button id="btnReset" class="btn btn-outline">↩ 重置</button>
    </footer>
  </div><!-- /mainApp -->

  <!-- 模态框：板块选择 -->
  <div id="sectionModal" class="modal hidden">
    <div class="modal-content">
      <h4>检测到多个匹配板块，请选择</h4>
      <div id="sectionOptions" class="section-options"></div>
      <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
